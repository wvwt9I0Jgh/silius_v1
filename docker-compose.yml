services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: silius-community-platform:latest
    container_name: silius-app
    restart: unless-stopped
    ports:
      - "3000:80"   # Host 3000 → Container 80 (nginx)
    env_file:
      - .env        # VITE_* değişkenleri build aşamasında kullanılır;
                    # runtime env gerekiyorsa aşağıdaki environment bloğunu açın
    # environment:
    #   - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
    #   - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
