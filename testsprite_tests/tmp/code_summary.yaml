version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 19
  - React Router DOM (HashRouter)
  - Tailwind CSS
  - Supabase (Auth, Database, Storage, Realtime)
  - Vite
routes:
  - path: /
    file: pages/Landing.tsx
    auth_required: false
    description: Landing page with product introduction and hidden admin trigger.
  - path: /auth
    file: pages/Auth.tsx
    auth_required: false
    description: Email/password and Google OAuth sign-in and sign-up page.
  - path: /about
    file: pages/About.tsx
    auth_required: false
    description: About page.
  - path: /security
    file: pages/Security.tsx
    auth_required: false
    description: Security and privacy information page.
  - path: /guidelines
    file: pages/Guidelines.tsx
    auth_required: false
    description: Community guidelines page.
  - path: /cookie-policy
    file: pages/Cookie.tsx
    auth_required: false
    description: Cookie policy page.
  - path: /contact
    file: pages/Contact.tsx
    auth_required: false
    description: Contact page.
  - path: /nasil-kullanilir
    file: pages/HowToUse.tsx
    auth_required: false
    description: How-to-use guide page.
  - path: /vibeler
    file: pages/Vibeler.tsx
    auth_required: false
    description: Public vibe/leaderboard statistics page.
  - path: /topluluk
    file: pages/Topluluk.tsx
    auth_required: false
    description: Community showcase page.
  - path: /mekanlar
    file: pages/Mekanlar.tsx
    auth_required: false
    description: Venue discovery page.
  - path: /info
    file: pages/Info.tsx
    auth_required: false
    description: Public info page.
  - path: /galerimiz
    file: pages/Galerimiz.tsx
    auth_required: false
    description: Public site gallery page.
  - path: /checkin/:eventId
    file: pages/CheckInPage.tsx
    auth_required: false
    description: QR check-in landing route for events.
  - path: /page/:slug
    file: pages/CMSPageView.tsx
    auth_required: false
    description: Public dynamic CMS page route.
  - path: /profile-setup
    file: pages/ProfileSetup.tsx
    auth_required: true
    description: Mandatory profile completion flow for new users.
  - path: /home
    file: pages/Home.tsx
    auth_required: true
    description: Main event feed and event creation page.
  - path: /events/:id
    file: pages/EventDetail.tsx
    auth_required: true
    description: Event detail with participation, comments, and gallery.
  - path: /users
    file: pages/Users.tsx
    auth_required: true
    description: User discovery page.
  - path: /friends
    file: pages/Friends.tsx
    auth_required: true
    description: Follow network and reverse-follow lists.
  - path: /profile
    file: pages/Profile.tsx
    auth_required: true
    description: User profile edit and activity page.
  - path: /my-qr
    file: pages/MyQR.tsx
    auth_required: true
    description: User-owned event QR codes page.
  - path: /admin
    file: pages/Admin.tsx
    auth_required: true
    description: Admin dashboard page.
  - path: /admin/users
    file: pages/admin/AdminUsers.tsx
    auth_required: true
    description: Admin user management page.
  - path: /admin/vibes
    file: pages/admin/AdminVibes.tsx
    auth_required: true
    description: Admin event moderation page.
  - path: /admin/pages
    file: pages/admin/AdminPages.tsx
    auth_required: true
    description: Admin CMS pages management page.
  - path: /admin/pages/:id
    file: pages/admin/PageEditor.tsx
    auth_required: true
    description: Admin CMS module editor page.
  - path: /admin/bans
    file: pages/admin/AdminBans.tsx
    auth_required: true
    description: Admin ban management page.
  - path: /admin/gallery
    file: pages/admin/AdminGallery.tsx
    auth_required: true
    description: Admin site gallery management page.
features:
  - name: Authentication and Session Management
    description: Users can sign in with email/password or Google OAuth and maintain session with profile cache.
    files:
      - pages/Auth.tsx
      - context/AuthContext.tsx
      - index.tsx
      - lib/supabase.ts
    entry_route: /auth
    user_interactions:
      - Open auth page.
      - Enter email and password or click Google sign-in.
      - Submit sign-in/sign-up form.
      - Observe redirect to home after successful login.
      - See validation or OAuth error message on failure.
    api_calls:
      - method: POST
        endpoint: /auth/v1/signup
      - method: POST
        endpoint: /auth/v1/token?grant_type=password
      - method: GET
        endpoint: /auth/v1/user
    auth_required: false
  - name: Profile Completion Gate
    description: Newly authenticated users must complete profile fields before accessing protected pages.
    files:
      - pages/ProfileSetup.tsx
      - App.tsx
      - context/AuthContext.tsx
      - lib/profileUtils.ts
    entry_route: /profile-setup
    user_interactions:
      - Fill first name, last name, username, birth date, district, and gender.
      - Submit profile setup form.
      - Get blocked with inline error if age is outside 18-30.
      - Get redirected to home after successful completion.
    api_calls:
      - method: PATCH
        endpoint: /rest/v1/users?id=eq.{userId}
    auth_required: true
  - name: Event Feed and Event Creation
    description: Authenticated users browse and create vibes with daily limits and category selection.
    files:
      - pages/Home.tsx
      - database.ts
      - components/LocationPicker.tsx
    entry_route: /home
    user_interactions:
      - Open event feed.
      - Filter or search events.
      - Fill event form with title, description, date, location, category, and image.
      - Submit event and see it in the list.
      - Observe daily creation limit feedback when limit is reached.
    api_calls:
      - method: GET
        endpoint: /rest/v1/events
      - method: POST
        endpoint: /rest/v1/events
      - method: PATCH
        endpoint: /rest/v1/users?id=eq.{userId}
    auth_required: true
  - name: Event Detail Participation and Comments
    description: Users can join/leave events, read participants, and post nested comments in event detail page.
    files:
      - pages/EventDetail.tsx
      - database.ts
    entry_route: /events/:id
    user_interactions:
      - Open event detail page from feed.
      - Join event with one click.
      - Leave event.
      - Add comment and reply to existing comment.
      - Open gallery images and view participant counters.
    api_calls:
      - method: GET
        endpoint: /rest/v1/events?id=eq.{eventId}
      - method: GET
        endpoint: /rest/v1/event_participants?event_id=eq.{eventId}
      - method: POST
        endpoint: /rest/v1/event_participants
      - method: DELETE
        endpoint: /rest/v1/event_participants?event_id=eq.{eventId}&user_id=eq.{userId}
      - method: GET
        endpoint: /rest/v1/comments?event_id=eq.{eventId}
      - method: POST
        endpoint: /rest/v1/comments
    auth_required: true
  - name: QR Check-in Flow
    description: Users can access check-in page via QR URL and mark attendance for an event.
    files:
      - pages/CheckInPage.tsx
      - pages/MyQR.tsx
      - database.ts
    entry_route: /checkin/:eventId
    user_interactions:
      - Open check-in URL from QR scan.
      - Confirm check-in action.
      - See success/error feedback after attendance update.
      - Open My QR page to view owned event QR codes.
    api_calls:
      - method: GET
        endpoint: /rest/v1/event_participants?event_id=eq.{eventId}&user_id=eq.{userId}
      - method: DELETE
        endpoint: /rest/v1/event_participants?event_id=eq.{eventId}&user_id=eq.{userId}
      - method: POST
        endpoint: /rest/v1/event_participants
    auth_required: false
  - name: Social Graph and Notifications
    description: Users discover people, follow users, and receive in-app notifications.
    files:
      - pages/Users.tsx
      - pages/Friends.tsx
      - components/Navbar.tsx
      - database.ts
    entry_route: /users
    user_interactions:
      - Browse user discovery list.
      - Follow another user.
      - Open friends and reverse-friends tabs.
      - Open notification panel from navbar.
      - Mark single notification or all notifications as read.
    api_calls:
      - method: GET
        endpoint: /rest/v1/users
      - method: POST
        endpoint: /rest/v1/friends
      - method: GET
        endpoint: /rest/v1/notifications?user_id=eq.{userId}
      - method: PATCH
        endpoint: /rest/v1/notifications?id=eq.{notificationId}
    auth_required: true
  - name: CMS Public Pages and Admin Editing
    description: Dynamic CMS pages are public while admin users can manage pages and modules.
    files:
      - pages/CMSPageView.tsx
      - pages/admin/AdminPages.tsx
      - pages/admin/PageEditor.tsx
      - database.ts
    entry_route: /page/:slug
    user_interactions:
      - Open published CMS page by slug.
      - Admin opens CMS page list.
      - Admin creates or edits page metadata.
      - Admin adds, edits, deletes, and reorders modules.
    api_calls:
      - method: GET
        endpoint: /rest/v1/cms_pages
      - method: GET
        endpoint: /rest/v1/cms_modules?page_id=eq.{pageId}
      - method: POST
        endpoint: /rest/v1/cms_pages
      - method: POST
        endpoint: /rest/v1/cms_modules
      - method: PATCH
        endpoint: /rest/v1/cms_modules?id=eq.{moduleId}
      - method: DELETE
        endpoint: /rest/v1/cms_modules?id=eq.{moduleId}
    auth_required: false
  - name: Admin Moderation and Site Gallery
    description: Admin users can manage users, bans, events, and site gallery content.
    files:
      - pages/Admin.tsx
      - pages/admin/AdminUsers.tsx
      - pages/admin/AdminVibes.tsx
      - pages/admin/AdminBans.tsx
      - pages/admin/AdminGallery.tsx
      - database.ts
    entry_route: /admin
    user_interactions:
      - Open admin dashboard.
      - Manage user role/ban state.
      - Delete or update events from admin panel.
      - Add and delete images in site gallery.
    api_calls:
      - method: GET
        endpoint: /rest/v1/users
      - method: GET
        endpoint: /rest/v1/events
      - method: POST
        endpoint: /rest/v1/banned_users
      - method: POST
        endpoint: /rest/v1/banned_ips
      - method: GET
        endpoint: /rest/v1/site_gallery
      - method: POST
        endpoint: /rest/v1/site_gallery
      - method: DELETE
        endpoint: /rest/v1/site_gallery?id=eq.{imageId}
    auth_required: true
known_limitations:
  - issue: Friend removal operation is not implemented in current database service API.
    location: database.ts
    impact: Users can follow but cannot directly unfollow through a dedicated remove method.
  - issue: Admin access can be granted from localStorage secret flag in addition to role-based auth.
    location: App.tsx
    impact: Client-side bypass risk if secret flag is exposed.
  - issue: Service role key can be used in frontend runtime for admin client.
    location: lib/supabase.ts
    impact: Increased security risk compared to server-side admin execution.
